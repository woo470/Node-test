<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root {
            --p-color: #ff4444;
            --n-color: #4444ff;
            --bg-dark: #0a0a0c;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        canvas { display: block; }

        #home-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #202433;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);

            transition: all 0.2s ease;
        }

        #home-btn:hover {
            background: #2a2f42;
            border-color: rgba(255, 255, 255, 0.3);
        }

        #sidebar {
            position: absolute;
            left: 20px;
            top: 20px;
            width: 180px;
            height: calc(100% - 40px);
            background: #111111;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 20px;

        .block-item {

            background: #2a2b2e;
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            font-size: 0.95rem;

        }

        .block-item:hover { background: #3a3b3e; color: #fff; }

        .block-item.active {
            background: #4a4b4e;
            border-color: #00f2fe;

        .icon {
            width: 24px;

            border-radius: 6px;

        .icon-p {
            border: 2px solid #ff3366;

            text-shadow: 0 0 5px rgba(68, 119, 255, 0.8);

        .icon-plus {
            border: 2px solid #ff3333;
            border-radius: 50%;
            color: #ff3333;
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.6), inset 0 0 8px rgba(255, 51, 51, 0.4);
            text-shadow: 0 0 5px rgba(255, 51, 51, 0.8);
            font-size: 1.1rem;
        }

        .icon-minus {
            border: 2px solid #3366ff;
            border-radius: 50%;

            box-shadow: 0 0 8px rgba(51, 102, 255, 0.6), inset 0 0 8px rgba(51, 102, 255, 0.4);

        .reset-btn {

        #context-menu {
            position: absolute;

        .menu-title {
            font-size: 0.8rem;
            color: #00f2fe;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;

            justify-content: space-between;
            align-items: center;
        }

        .menu-close { color: #888; cursor: pointer; font-size: 0.9rem; }
        .menu-close:hover { color: #ff4444; }

        .menu-input-row {
            display: flex;
            align-items: center;
            gap: 5px;

        }

        .menu-input-row input {
            width: 40px;

        .menu-btn {
            width: 100%;

        .menu-btn.apply { background: #007bff; color: white; margin-top: 5px; }

        #guide {
            position: absolute;

        .success-hud-container {
            position: absolute;

            padding: 30px 40px;
            background: rgba(10, 15, 25, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15), inset 0 0 15px rgba(0, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
            overflow: hidden;
            opacity: 0;

            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 300;

        .success-hud-container.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .hud-title {
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;

        .hud-detail {
            color: #a0c0d0;
            font-size: 0.9rem;
            margin: 0;
        }

        .hud-scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 10px #00ffff;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
    </style>
</head>

<body>

    <div id="ui-container">
        <a id="home-btn" href="index.html">← Home</a>
        <div id="sidebar">
            <div class="block-item" onclick="selectType('P', this)">
                <div class="icon icon-p">P</div><span>P형</span>
            </div>
            <div class="block-item" onclick="selectType('N', this)">
                <div class="icon icon-n">N</div><span>N형</span>
            </div>
            <div class="block-item" onclick="selectType('PLUS', this)">
                <div class="icon icon-plus">+</div><span>+전극</span>
            </div>
            <div class="block-item" onclick="selectType('MINUS', this)">
                <div class="icon icon-minus">&minus;</div><span>-전극</span>
            </div>
            <div class="block-item" onclick="selectType('WIRE', this)">
                <div class="icon icon-wire"></div><span>도선</span>
            </div>
            <button class="reset-btn" onclick="resetScene()">전체 리셋</button>
        </div>
        <div id="context-menu"></div>
        <div id="guide">부품을 골라 배치하고, 전극(+/−) 사이를 도선과 반도체로 연결하세요.</div>
        <div id="success-hud" class="success-hud-container">
            <div class="hud-scanline"></div>
            <h2 class="hud-title">PN 접합 성공</h2>
            <p class="hud-detail">회로가 정상적으로 연결되어 전류가 흐릅니다.</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, controls, composer, plane, gridHelper, ghostMesh = null;
        let curMapX = 10, curMapZ = 10;
        const GRID_SIZE = 2;
        const WIRE_Y = 0.12;
        let objects = [], particles = [], wireArrows = [];
        let sparks = [];
        let selectedType = null;
        let lastClickTime = 0, mouseDownPos = new THREE.Vector2();
        let rightClickedObject = null;
        let targetDistance = 20;
        let isDrawingWire = false;
        let lastWirePos = new THREE.Vector3();
        let activeIds = new Set();
        let lastPathSig = '';
        let wasFlowing = false;

        init3D();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a24);
            scene.fog = new THREE.FogExp2(0x1a1a24, 0.015);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 20, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 1.5;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.2;
            bloomPass.strength = 1.8;
            bloomPass.radius = 0.5;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.ROTATE };
            controls.enableZoom = false;
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05;

            const zoomLevels = [8, 20, 35];
            let currentZoomIndex = 1;

            renderer.domElement.addEventListener('wheel', (e) => {
                if (e.deltaY > 0) currentZoomIndex = Math.min(2, currentZoomIndex + 1);
                else currentZoomIndex = Math.max(0, currentZoomIndex - 1);
                targetDistance = zoomLevels[currentZoomIndex];
            });

            updateFloor();
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(15, 30, 20);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 100;
            const d = 30;
            sun.shadow.camera.left = -d;
            sun.shadow.camera.right = d;
            sun.shadow.camera.top = d;
            sun.shadow.camera.bottom = -d;
            sun.shadow.bias = -0.0005;
            scene.add(sun);

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', (e) => {
                mouseDownPos.set(e.clientX, e.clientY);
                if (e.button === 2) document.getElementById('context-menu').style.display = 'none';
            });
            window.addEventListener('mouseup', onMouseUp);
            window.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('resize', onWindowResize);

            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    if (selectedType) {
                        clearSelection();
                    } else if (document.getElementById('context-menu').style.display === 'block' && rightClickedObject) {
                        deleteObj();
                    }
                } else if (e.key === 'Escape') {
                    if (isDrawingWire) { isDrawingWire = false; hideArrows(); }
                    if (selectedType) clearSelection();
                    document.getElementById('context-menu').style.display = 'none';
                }
            });

            animate();
        }

        function updateFloor() {
            if (plane) scene.remove(plane);
            if (gridHelper) scene.remove(gridHelper);
            const maxDim = Math.max(curMapX, curMapZ);
            gridHelper = new THREE.GridHelper(maxDim * GRID_SIZE, maxDim, 0x444455, 0x222233);
            const sizeX = curMapX * GRID_SIZE, sizeZ = curMapZ * GRID_SIZE;
            if (sizeX > sizeZ) gridHelper.scale.z = sizeZ / sizeX; else gridHelper.scale.x = sizeX / sizeZ;
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);
            plane = new THREE.Mesh(
                new THREE.PlaneGeometry(sizeX, sizeZ),
                new THREE.MeshStandardMaterial({ color: 0x050508, roughness: 0.8, metalness: 0.2 })
            );
            plane.rotateX(-Math.PI / 2);
            plane.receiveShadow = true;
            plane.userData.isFloor = true;
            scene.add(plane);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls && camera) {
                const dist = camera.position.distanceTo(controls.target);
                if (Math.abs(dist - targetDistance) > 0.05) {
                    const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
                    const newDist = dist + (targetDistance - dist) * 0.1;
                    camera.position.copy(controls.target).add(dir.multiplyScalar(newDist));
                }
            }

            controls.update();
            const physicsResult = checkStrictPhysics();
            const isFlowing = updateLogicState(physicsResult);
            updateParticles(isFlowing);
            updateSparks();
            if (composer) composer.render();
            else renderer.render(scene, camera);
        }

        function checkStrictPhysics() {
            const allPlus = objects.filter(o => o.userData.type === 'PLUS');
            const allMinus = objects.filter(o => o.userData.type === 'MINUS');
            if (allPlus.length === 0 || allMinus.length === 0) return false;

            const isAdjacent = (a, b) => Math.hypot(a.position.x - b.position.x, a.position.z - b.position.z) <= GRID_SIZE + 0.1;

            const interceptedIds = new Set();
            objects.forEach(wire => {
                if (wire.userData.type === 'WIRE') {
                    if (objects.some(s => (s.userData.type === 'P' || s.userData.type === 'N') &&
                        Math.abs(s.position.x - wire.position.x) < 0.1 &&
                        Math.abs(s.position.z - wire.position.z) < 0.1)) {
                        interceptedIds.add(wire.id);
                    }
                }
            });

            const VALID = ['P,N', 'N,P', 'P,N,P', 'N,P,N'];
            const isValidPrefix = s => s === '' || VALID.some(v => v === s || v.startsWith(s + ','));

            for (const plus of allPlus) {
                for (const minus of allMinus) {
                    const result = tryCircuit(plus, minus);
                    if (result) return result;
                }
            }
            return false;

            function tryCircuit(plus, minus) {
                let queue = [{ node: plus, path: [plus], seq: [] }];
                let visited = new Set([plus.id + '|']);

                while (queue.length > 0) {
                    const { node: curr, path, seq } = queue.shift();
                    const seqStr = seq.join(',');

                    if (curr === minus) {
                        if (VALID.includes(seqStr)) return { fullPath: path, type: seqStr };
                        continue;
                    }

                    for (const next of objects) {
                        if (interceptedIds.has(next.id)) continue;
                        if (!isAdjacent(curr, next) || next === curr) continue;
                        if (next !== minus && (next.userData.type === 'PLUS' || next.userData.type === 'MINUS')) continue;

                        let newSeq = seq;
                        const t = next.userData.type;
                        if ((t === 'P' || t === 'N') && seq[seq.length - 1] !== t) newSeq = [...seq, t];
                        const newSeqStr = newSeq.join(',');
                        if (!isValidPrefix(newSeqStr)) continue;

                        const key = next.id + '|' + newSeqStr;
                        if (visited.has(key)) continue;
                        visited.add(key);
                        queue.push({ node: next, path: [...path, next], seq: newSeq });
                    }
                }
                return null;
            }
        }

        let hudTimeout = null;
        function updateLogicState(physicsResult) {
            const isFlowing = !!physicsResult;
            const sig = isFlowing ? physicsResult.fullPath.map(n => n.id).join('-') : '';
            if (sig === lastPathSig) return isFlowing;
            lastPathSig = sig;

            clearSparks();
            activeIds.clear();
            objects.forEach(o => o.userData.flowDir = null);

            const hud = document.getElementById('success-hud');
            if (isFlowing) {
                const title = hud.querySelector('.hud-title');
                const detail = hud.querySelector('.hud-detail');
                if (physicsResult.type === 'P,N') {
                    title.innerText = 'PN 접합 성공';
                    detail.innerText = '순방향 바이어스 — 정공과 전자가 접합면에서 재결합하며 전류가 흐릅니다.';
                } else if (physicsResult.type === 'N,P') {
                    title.innerText = 'NP 접합 성공';
                    detail.innerText = '역방향 바이어스 — N형에서 P형으로 전류가 흐릅니다.';
                } else if (physicsResult.type === 'P,N,P') {
                    title.innerText = 'PNP 접합 성공';
                    detail.innerText = 'PNP 트랜지스터 구조가 완성되어 전류가 흐릅니다.';
                } else {
                    title.innerText = 'NPN 접합 성공';
                    detail.innerText = 'NPN 트랜지스터 구조가 완성되어 전류가 흐릅니다.';
                }
                hud.classList.add('active');
                if (hudTimeout) clearTimeout(hudTimeout);
                hudTimeout = setTimeout(() => hud.classList.remove('active'), 3000);

                const p = physicsResult.fullPath;
                p.forEach((n, i) => {
                    activeIds.add(n.id);
                    if (i < p.length - 1) {
                        n.userData.flowDir = new THREE.Vector3()
                            .subVectors(p[i + 1].position, n.position).setY(0).normalize();
                    }
                });
                createSparks(p, 0xffdd00);
            } else {
                hud.classList.remove('active');
                if (hudTimeout) clearTimeout(hudTimeout);
            }
            return isFlowing;
        }

        function createSparks(pathNodes, colorHex) {
            if (!pathNodes || pathNodes.length < 2) return;
            const points = pathNodes.map(node => {
                const p = node.position.clone();
                p.y = Math.max(p.y, 0) + 0.4;
                return p;
            });
            const curve = new THREE.CatmullRomCurve3(points);

            for (let i = 0; i < 3; i++) {
                const sparkGeo = new THREE.SphereGeometry(0.18, 16, 16);
                const sparkMat = new THREE.MeshBasicMaterial({ color: colorHex });
                const spark = new THREE.Mesh(sparkGeo, sparkMat);
                const sparkLight = new THREE.PointLight(colorHex, 2, 3);
                spark.add(sparkLight);
                scene.add(spark);
                sparks.push({ mesh: spark, curve: curve, progress: i * 0.33, speed: 0.008 });
            }
        }

        function clearSparks() {
            sparks.forEach(s => scene.remove(s.mesh));
            sparks = [];
        }

        function updateSparks() {
            sparks.forEach(s => {
                s.progress += s.speed;
                if (s.progress > 1) s.progress = 0;
                const currentPos = s.curve.getPointAt(s.progress);
                s.mesh.position.copy(currentPos);
            });
        }

        function updateParticles(isFlowing) {
            const worldP = new THREE.Vector3();
            const tmp = new THREE.Vector3();
            particles.forEach(p => {
                if (p.isDead) return;
                p.mesh.getWorldPosition(worldP);
                if (worldP.distanceTo(p.parent.position) > 2.5) { resetSingleParticle(p); return; }
                const fd = isFlowing ? p.parent.userData.flowDir : null;
                if (fd) {
                    const dir = (p.type === 'N') ? tmp.copy(fd).negate() : tmp.copy(fd);
                    p.mesh.position.addScaledVector(dir, 0.05);
                } else {
                    p.mesh.position.addScaledVector(new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5), 0.01);
                }
            });
        }

        function resetSingleParticle(p) { p.mesh.position.set((Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 1.5); }

        function cellBlocked(pos, placingType) {
            return objects.some(o => {
                if (Math.abs(o.position.x - pos.x) > 0.1 || Math.abs(o.position.z - pos.z) > 0.1) return false;
                const t = o.userData.type;
                if (placingType === 'P' || placingType === 'N') return t !== 'WIRE';
                return true;
            });
        }

        function inBounds(pos) {
            return Math.abs(pos.x) <= (curMapX * GRID_SIZE) / 2 - 0.5 &&
                   Math.abs(pos.z) <= (curMapZ * GRID_SIZE) / 2 - 0.5;
        }

        function spawnReal(type, pos, isAutoDraw = false) {
            if (cellBlocked(pos, type)) { if (!isAutoDraw) clearSelection(); return; }

            const group = new THREE.Group();
            group.userData.type = type;
            group.position.copy(pos);
            if (type === 'WIRE') group.position.y = WIRE_Y;

            if (type === 'WIRE') {
                const geo = new RoundedBoxGeometry(2, 0.4, 2, 4, 0.1);
                const mat = new THREE.MeshPhysicalMaterial({ color: 0xcd7f32, metalness: 1.0, roughness: 0.2, clearcoat: 1.0, clearcoatRoughness: 0.1 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true; mesh.receiveShadow = true;
                group.add(mesh);
            } else if (type === 'P' || type === 'N') {
                const geo = new RoundedBoxGeometry(2, 2, 2, 6, 0.2);
                const mat = new THREE.MeshPhysicalMaterial({
                    color: type === 'P' ? 0xff3333 : 0x3333ff,
                    metalness: 0.1, roughness: 0.05,
                    transmission: 0.95, thickness: 2.0,
                    ior: 1.5,
                    transparent: true, opacity: 1.0,
                    clearcoat: 1.0, clearcoatRoughness: 0.1,
                    iridescence: 0.8,
                    iridescenceIOR: 1.3,
                    iridescenceThicknessRange: [100, 400]
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true; mesh.receiveShadow = true;
                group.add(mesh);
                for (let i = 0; i < 10; i++) {
                    const m = new THREE.Mesh(
                        new THREE.SphereGeometry(0.12, 16, 16),
                        new THREE.MeshStandardMaterial({
                            color: 0xffffff,
                            emissive: type === 'P' ? 0xff2222 : 0x2222ff,
                            emissiveIntensity: 2.5,
                            roughness: 0.1,
                            toneMapped: false
                        })
                    );
                    m.position.set((Math.random() - 0.5) * 1.6, (Math.random() - 0.5) * 1.6, (Math.random() - 0.5) * 1.6);
                    group.add(m); particles.push({ mesh: m, type: type, isDead: false, parent: group });
                }
            } else {
                const baseGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.4, 32);
                const baseMat = new THREE.MeshPhysicalMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.5 });
                const baseMesh = new THREE.Mesh(baseGeo, baseMat);
                baseMesh.position.y = -0.8;
                baseMesh.castShadow = true; baseMesh.receiveShadow = true;
                group.add(baseMesh);

                const bodyGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.6, 32);
                const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.2, clearcoat: 1.0 });
                const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
                bodyMesh.position.y = 0.2;
                bodyMesh.castShadow = true; bodyMesh.receiveShadow = true;
                group.add(bodyMesh);

                const ringGeo = new THREE.TorusGeometry(0.61, 0.05, 16, 32);
                const ringMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: type === 'PLUS' ? 0xff2222 : 0x2222ff,
                    emissiveIntensity: 6.0,
                    toneMapped: false
                });
                const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                ringMesh.position.y = 0.5;
                ringMesh.rotation.x = Math.PI / 2;
                group.add(ringMesh);

                const capGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 32);
                const capMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 1.0, roughness: 0.1 });
                const capMesh = new THREE.Mesh(capGeo, capMat);
                capMesh.position.y = 1.1;
                capMesh.castShadow = true;
                group.add(capMesh);

                const signMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: type === 'PLUS' ? 0xff2222 : 0x2222ff,
                    emissiveIntensity: 4.0,
                    toneMapped: false
                });
                const signH = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.12), signMat);
                signH.position.y = 1.21;
                group.add(signH);
                if (type === 'PLUS') {
                    const signV = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.05, 0.5), signMat);
                    signV.position.y = 1.21;
                    group.add(signV);
                }
            }

            group.scale.set(0.01, 0.01, 0.01);
            scene.add(group); objects.push(group);

            let scaleFrames = 0;
            const popAnim = () => {
                scaleFrames++;
                group.scale.lerp(new THREE.Vector3(1, 1, 1), 0.2);
                if (scaleFrames < 30) requestAnimationFrame(popAnim);
                else group.scale.set(1, 1, 1);
            };
            popAnim();

            if (type === 'WIRE') {
                if (!isAutoDraw) updateWireArrows(group.position);
                else hideArrows();
            } else {
                hideArrows();
            }
            if (!isAutoDraw) clearSelection();
        }

        function removeObject(t) {
            particles = particles.filter(p => p.parent !== t);
            scene.remove(t);
            objects = objects.filter(o => o !== t);
        }

        function updateWireArrows(basePos) {
            hideArrows();
            [new THREE.Vector3(2, 0, 0), new THREE.Vector3(-2, 0, 0), new THREE.Vector3(0, 0, 2), new THREE.Vector3(0, 0, -2)].forEach(d => {
                const tp = new THREE.Vector3(basePos.x + d.x, 0, basePos.z + d.z);
                if (!inBounds(tp)) return;
                if (!objects.some(o => Math.abs(o.position.x - tp.x) < 0.1 && Math.abs(o.position.z - tp.z) < 0.1)) {
                    const a = new THREE.Mesh(
                        new THREE.ConeGeometry(0.3, 0.6, 16),
                        new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa00, transparent: true, opacity: 0.8 })
                    );
                    a.position.set(tp.x, 0.3, tp.z);
                    a.lookAt(new THREE.Vector3(basePos.x, 0.3, basePos.z));
                    a.rotateX(Math.PI / 2);
                    scene.add(a); wireArrows.push(a);
                }
            });
        }

        function hideArrows() { wireArrows.forEach(a => scene.remove(a)); wireArrows = []; }

        function onMouseUp(event) {
            if (event.target !== renderer.domElement) return;
            const dragDist = mouseDownPos.distanceTo(new THREE.Vector2(event.clientX, event.clientY));
            if (event.button === 0) {
                if (dragDist > 5) return;

                if (isDrawingWire) {
                    isDrawingWire = false;
                    updateWireArrows(lastWirePos);
                    return;
                }

                const ray = new THREE.Raycaster();
                ray.setFromCamera(getMousePos(event), camera);

                const aHit = ray.intersectObjects(wireArrows);
                if (aHit.length > 0) {
                    isDrawingWire = true;
                    lastWirePos.copy(aHit[0].object.position).setY(0);
                    spawnReal('WIRE', lastWirePos.clone(), true);
                    return;
                }

                const oHit = ray.intersectObjects(objects, true);
                if (oHit.length > 0) {
                    let t = oHit[0].object;
                    while (t.parent && !t.userData.type) t = t.parent;
                    if (t && t.userData.type) {
                        const now = Date.now();
                        const isDBL = (now - lastClickTime < 300);
                        lastClickTime = now;
                        if (isDBL && t.userData.type === 'WIRE') { updateWireArrows(t.position); return; }

                        const type = t.userData.type;
                        removeObject(t);
                        document.querySelectorAll('.block-item').forEach(b => {
                            b.classList.remove('active');
                            if (b.getAttribute('onclick').includes(`'${type}'`)) b.classList.add('active');
                        });
                        selectedType = type;
                        createGhost(type);
                        ghostMesh.visible = true;
                        ghostMesh.position.copy(t.position);
                        hideArrows();
                        return;
                    }
                }

                if (selectedType && ghostMesh?.visible && !ghostMesh.userData.blocked) {
                    spawnReal(selectedType, ghostMesh.position.clone());
                } else hideArrows();
            } else if (event.button === 2) {
                if (dragDist < 5) {
                    const ray = new THREE.Raycaster();
                    ray.setFromCamera(getMousePos(event), camera);
                    const hits = ray.intersectObjects([...objects, plane], true);
                    if (hits.length > 0) {
                        let t = hits[0].object;
                        while (t.parent && !t.userData.type && !t.userData.isFloor) t = t.parent;
                        showContextMenu(event.clientX, event.clientY, t);
                    }
                }
            }
        }

        function showContextMenu(x, y, target) {
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            rightClickedObject = target;

            const closeBtnHtml = `<span class="menu-close" onclick="closeContextMenu()">✕</span>`;

            if (target.userData.isFloor) {
                menu.innerHTML = `<div class="menu-title"><span>맵 크기 설정</span>${closeBtnHtml}</div>
                    <div class="menu-input-row">X: <input type="number" id="menuX" min="4" max="40" value="${curMapX}"></div>
                    <div class="menu-input-row">Z: <input type="number" id="menuZ" min="4" max="40" value="${curMapZ}"></div>
                    <button class="menu-btn apply" onclick="applyMenuMapSize()">적용하기</button>`;
            } else {
                menu.innerHTML = `<div class="menu-title"><span>부품 설정</span>${closeBtnHtml}</div><button class="menu-btn delete" onclick="deleteObj()">삭제하기</button>`;
            }
        }

        window.closeContextMenu = () => {
            document.getElementById('context-menu').style.display = 'none';
        };

        window.applyMenuMapSize = () => {
            curMapX = Math.min(40, Math.max(4, parseInt(document.getElementById('menuX').value) || 10));
            curMapZ = Math.min(40, Math.max(4, parseInt(document.getElementById('menuZ').value) || 10));
            updateFloor();
            document.getElementById('context-menu').style.display = 'none';
        };

        window.deleteObj = () => {
            if (rightClickedObject && !rightClickedObject.userData.isFloor) {
                removeObject(rightClickedObject);
            }
            rightClickedObject = null;
            document.getElementById('context-menu').style.display = 'none';
        };

        function onMouseMove(event) {
            const intersect = getGridIntersect(event);

            if (isDrawingWire && intersect) {
                let currentPos = lastWirePos.clone().setY(0);
                let failsafe = 0;
                while (currentPos.distanceTo(intersect) > 0.1 && failsafe++ < 100) {
                    const dx = intersect.x - currentPos.x;
                    const dz = intersect.z - currentPos.z;
                    if (Math.abs(dx) > Math.abs(dz)) currentPos.x += Math.sign(dx) * GRID_SIZE;
                    else currentPos.z += Math.sign(dz) * GRID_SIZE;

                    if (!inBounds(currentPos)) break;
                    if (cellBlocked(currentPos, 'WIRE')) break;
                    spawnReal('WIRE', currentPos.clone(), true);
                }
                lastWirePos.copy(currentPos);
            }

            if (intersect && selectedType && !isDrawingWire) {
                if (!ghostMesh) createGhost(selectedType);
                ghostMesh.visible = true;
                ghostMesh.position.copy(intersect);
                ghostMesh.position.y = (selectedType === 'WIRE') ? WIRE_Y : 1;
                const blocked = cellBlocked(intersect, selectedType);
                ghostMesh.userData.blocked = blocked;
                ghostMesh.material.color.setHex(blocked ? 0xff3344 : 0x00f2fe);
            } else if (ghostMesh) ghostMesh.visible = false;
        }

        function getGridIntersect(event) {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(getMousePos(event), camera);
            const hits = ray.intersectObject(plane);
            if (hits.length > 0) {
                const v = new THREE.Vector3(
                    Math.round(hits[0].point.x / GRID_SIZE) * GRID_SIZE, 0,
                    Math.round(hits[0].point.z / GRID_SIZE) * GRID_SIZE
                );
                return inBounds(v) ? v : null;
            }
            return null;
        }

        function getMousePos(e) {
            return new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
        }

        function createGhost(type) {
            if (ghostMesh) scene.remove(ghostMesh);
            const geo = type === 'WIRE'
                ? new RoundedBoxGeometry(GRID_SIZE, 0.4, GRID_SIZE, 4, 0.1)
                : new RoundedBoxGeometry(GRID_SIZE, GRID_SIZE, GRID_SIZE, 6, 0.2);
            ghostMesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x00f2fe, transparent: true, opacity: 0.4, wireframe: true }));
            scene.add(ghostMesh);
        }

        window.selectType = (type, el) => {
            selectedType = type;
            hideArrows();
            document.querySelectorAll('.block-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            createGhost(type);
        };

        function clearSelection() {
            selectedType = null;
            if (ghostMesh) scene.remove(ghostMesh);
            ghostMesh = null;
            document.querySelectorAll('.block-item').forEach(b => b.classList.remove('active'));
        }

        window.resetScene = () => {
            objects.forEach(o => scene.remove(o));
            particles = [];
            objects = [];
            activeIds.clear();
            lastPathSig = '';
            hideArrows();
            clearSparks();
            document.getElementById('success-hud').classList.remove('active');
        };

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (composer) composer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>

</html>
