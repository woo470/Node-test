<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>P-N 접합 시뮬레이터 PRO - v9</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root {
            --p-color: #ff4444;
            --n-color: #4444ff;
            --bg-dark: #0a0a0c;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #home-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #202433;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 100;
            transition: all 0.2s ease;
        }

        #home-btn:hover {
            background: #2a2f42;
            border-color: rgba(255, 255, 255, 0.3);
        }

        #sidebar {
            position: absolute;
            left: 20px;
            top: 20px;
            width: 180px;
            height: calc(100% - 40px);
            background: #111111;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 20px;
            box-sizing: border-box;
            gap: 12px;
            z-index: 10;
        }

        .block-item {
            width: 100%;
            padding: 14px 18px;
            background: #2a2b2e;
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            font-size: 0.95rem;
            font-weight: 500;
            color: #d1d1d1;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .block-item:hover {
            background: #3a3b3e;
            color: #fff;
        }

        .block-item.active {
            background: #4a4b4e;
            border-color: #00f2fe;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            margin-right: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.8rem;
            flex-shrink: 0;
            background: transparent;
            box-sizing: border-box;
        }

        .icon-p {
            border: 2px solid #ff3366;
            color: #ff3366;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.6), inset 0 0 8px rgba(255, 51, 102, 0.4);
            text-shadow: 0 0 5px rgba(255, 51, 102, 0.8);
        }

        .icon-n {
            border: 2px solid #4477ff;
            color: #4477ff;
            box-shadow: 0 0 8px rgba(68, 119, 255, 0.6), inset 0 0 8px rgba(68, 119, 255, 0.4);
            text-shadow: 0 0 5px rgba(68, 119, 255, 0.8);
        }

        .icon-plus {
            border: 2px solid #ff3333;
            border-radius: 50%;
            color: #ff3333;
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.6), inset 0 0 8px rgba(255, 51, 51, 0.4);
            text-shadow: 0 0 5px rgba(255, 51, 51, 0.8);
            font-size: 1.1rem;
        }

        .icon-minus {
            border: 2px solid #3366ff;
            border-radius: 50%;
            color: #3366ff;
            box-shadow: 0 0 8px rgba(51, 102, 255, 0.6), inset 0 0 8px rgba(51, 102, 255, 0.4);
            text-shadow: 0 0 5px rgba(51, 102, 255, 0.8);
            font-size: 1.3rem;
        }

        .icon-wire {
            width: 20px;
            height: 10px;
            border: 2px solid #ffaa00;
            border-radius: 5px;
            box-shadow: 0 0 8px rgba(255, 170, 0, 0.6), inset 0 0 8px rgba(255, 170, 0, 0.4);
        }

        .reset-btn {
            margin-top: auto;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255, 68, 68, 0.5);
            color: #ff4444;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: rgba(255, 68, 68, 0.2);
            color: #fff;
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.4);
        }

        #context-menu {
            position: absolute;
            display: none;
            background: #1a1a22;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.9);
            min-width: 150px;
        }

        .menu-title {
            font-size: 0.8rem;
            color: #00f2fe;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-close {
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .menu-close:hover {
            color: #ff4444;
        }

        .menu-input-row {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }

        .menu-input-row input {
            width: 40px;
            background: #333;
            border: 1px solid #555;
            color: white;
            text-align: center;
            border-radius: 3px;
        }

        .menu-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .menu-btn.apply {
            background: #007bff;
            color: white;
            margin-top: 5px;
        }

        .menu-btn.delete {
            background: #e74c3c;
            color: white;
        }

        #guide {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #00f2fe;
            font-weight: bold;
            z-index: 5;
            pointer-events: none;
        }

        .success-hud-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            padding: 30px 40px;
            background: rgba(10, 15, 25, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15), inset 0 0 15px rgba(0, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            /* 클릭 방해 금지 */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 300;
        }

        .success-hud-container.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .hud-title {
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .hud-detail {
            color: #a0c0d0;
            font-size: 0.9rem;
            margin: 0 0 20px 0;
        }

        .hud-scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 10px #00ffff;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% {
                top: -10%;
            }

            100% {
                top: 110%;
            }
        }
    </style>
</head>

<body>

    <div id="ui-container">
        <a id="home-btn" href="index.html">← Home</a>
        <div id="sidebar">
            <div class="block-item" onclick="selectType('P', this)">
                <div class="icon icon-p">P</div><span>P형</span>
            </div>
            <div class="block-item" onclick="selectType('N', this)">
                <div class="icon icon-n">N</div><span>N형</span>
            </div>
            <div class="block-item" onclick="selectType('PLUS', this)">
                <div class="icon icon-plus">+</div><span>+전극</span>
            </div>
            <div class="block-item" onclick="selectType('MINUS', this)">
                <div class="icon icon-minus">&minus;</div><span>-전극</span>
            </div>
            <div class="block-item" onclick="selectType('WIRE', this)">
                <div class="icon icon-wire"></div><span>도선</span>
            </div>
            <button class="reset-btn" onclick="resetScene()">전체 리셋</button>
        </div>
        <div id="context-menu"></div>
        <div id="guide">정교한 회로 논리가 적용되었습니다. 전극과 부품을 올바르게 연결하세요.</div>
        <div id="success-hud" class="success-hud-container">
            <div class="hud-scanline"></div>
            <h2 class="hud-title">PN 접합 성공</h2>
            <p class="hud-detail">회로가 정상적으로 연결되어 전류가 흐릅니다.</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, controls, composer, plane, gridHelper, ghostMesh = null;
        let curMapX = 10, curMapZ = 10;
        const GRID_SIZE = 2;
        let objects = [], particles = [], wireArrows = [];
        let sparks = [];
        let selectedType = null;
        let lastClickTime = 0, mouseDownPos = new THREE.Vector2();
        let rightClickedObject = null;
        let targetDistance = 20; // 줌 타겟 거리
        let isDrawingWire = false;
        let lastWirePos = new THREE.Vector3();
        let wasFlowing = false;

        init3D();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a24);
            scene.fog = new THREE.FogExp2(0x1a1a24, 0.015);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 20, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 1.5;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.2;
            bloomPass.strength = 1.8;
            bloomPass.radius = 0.5;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.ROTATE };

            // 휠(줌)을 3단계로 커스텀
            controls.enableZoom = false; // 기본 줌 끄기
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const zoomLevels = [8, 20, 35]; // 가까이, 중간, 멀리 (멀리를 35로 확 줄임)
            let currentZoomIndex = 1;

            window.addEventListener('wheel', (e) => {
                if (e.deltaY > 0) currentZoomIndex = Math.min(2, currentZoomIndex + 1); // 줌 아웃
                else currentZoomIndex = Math.max(0, currentZoomIndex - 1); // 줌 인
                targetDistance = zoomLevels[currentZoomIndex];
            });

            updateFloor();
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(15, 30, 20);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 100;
            const d = 30;
            sun.shadow.camera.left = -d;
            sun.shadow.camera.right = d;
            sun.shadow.camera.top = d;
            sun.shadow.camera.bottom = -d;
            sun.shadow.bias = -0.0005;
            scene.add(sun);

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', (e) => {
                mouseDownPos.set(e.clientX, e.clientY);
                if (e.button === 2) document.getElementById('context-menu').style.display = 'none';
            });
            window.addEventListener('mouseup', onMouseUp);
            window.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('resize', onWindowResize);

            // 키보드 단축키 (삭제 및 취소 기능)
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    if (selectedType) {
                        clearSelection(); // 집어든 상태(고스트 메쉬)에서 삭제(취소)
                    } else if (document.getElementById('context-menu').style.display === 'block' && rightClickedObject) {
                        deleteObj(); // 우클릭 메뉴가 열려있을 때 타겟 오브젝트 삭제
                    }
                } else if (e.key === 'Escape') {
                    if (isDrawingWire) {
                        isDrawingWire = false;
                        hideArrows();
                    }
                    if (selectedType) clearSelection();
                    document.getElementById('context-menu').style.display = 'none';
                }
            });

            animate();
        }

        function updateFloor() {
            if (plane) scene.remove(plane);
            if (gridHelper) scene.remove(gridHelper);
            const maxDim = Math.max(curMapX, curMapZ);
            gridHelper = new THREE.GridHelper(maxDim * GRID_SIZE, maxDim, 0x444455, 0x222233);
            const sizeX = curMapX * GRID_SIZE, sizeZ = curMapZ * GRID_SIZE;
            if (sizeX > sizeZ) gridHelper.scale.z = sizeZ / sizeX; else gridHelper.scale.x = sizeX / sizeZ;
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);
            plane = new THREE.Mesh(
                new THREE.PlaneGeometry(sizeX, sizeZ),
                new THREE.MeshStandardMaterial({ color: 0x050508, roughness: 0.8, metalness: 0.2 }) // 눈부신 반사광(스페큘러) 제거를 위해 거칠기 증가, 금속성 감소
            );
            plane.rotateX(-Math.PI / 2);
            plane.receiveShadow = true;
            plane.userData.isFloor = true;
            scene.add(plane);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 3단계 카메라 줌 스무스 이동 로직
            if (controls && camera) {
                const dist = camera.position.distanceTo(controls.target);
                if (Math.abs(dist - targetDistance) > 0.05) {
                    const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
                    const newDist = dist + (targetDistance - dist) * 0.1;
                    camera.position.copy(controls.target).add(dir.multiplyScalar(newDist));
                }
            }

            controls.update();
            const physicsResult = checkStrictPhysics();
            const isFlowing = updateLogicState(physicsResult);
            updateParticles(isFlowing);
            updateSparks();
            if (composer) composer.render();
            else renderer.render(scene, camera);
        }

        // --- 물리 로직: PN, PNP, NPN 모두 지원 ---
        function checkStrictPhysics() {
            const allPlus = objects.filter(o => o.userData.type === 'PLUS');
            const allMinus = objects.filter(o => o.userData.type === 'MINUS');
            if (allPlus.length === 0 || allMinus.length === 0) return false;

            const isAdjacent = (a, b) => Math.hypot(a.position.x - b.position.x, a.position.z - b.position.z) <= GRID_SIZE + 0.1;

            // 반도체 밑에 깔린 도선은 무시
            const interceptedIds = new Set();
            objects.forEach(wire => {
                if (wire.userData.type === 'WIRE') {
                    if (objects.some(s => (s.userData.type === 'P' || s.userData.type === 'N') &&
                        Math.abs(s.position.x - wire.position.x) < 0.1 &&
                        Math.abs(s.position.z - wire.position.z) < 0.1)) {
                        interceptedIds.add(wire.id);
                    }
                }
            });

            // 모든 (+, -) 전극 쌍에 대해 유효한 회로를 탐색
            for (const plus of allPlus) {
                for (const minus of allMinus) {
                    const result = tryCircuit(plus, minus);
                    if (result) return result;
                }
            }
            return false;

            function tryCircuit(plus, minus) {
                // BFS로 + 에서 - 까지 모든 경로 탐색 (유효한 시퀀스를 찾을 때까지)
                let queue = [[plus]];
                let visited = new Set();
                visited.add(plus.id);

                while (queue.length > 0) {
                    let path = queue.shift();
                    let curr = path[path.length - 1];

                    if (curr === minus) {
                        // 경로 상의 반도체 시퀀스 추출
                        const seq = [];
                        let lastSemiType = null;
                        path.forEach(n => {
                            const t = n.userData.type;
                            if (t === 'P' || t === 'N') {
                                if (t !== lastSemiType) {
                                    seq.push(t);
                                    lastSemiType = t;
                                }
                            }
                        });
                        const seqStr = seq.join(',');

                        // 유효한 시퀀스: P,N (PN접합) / P,N,P (PNP) / N,P,N (NPN)
                        if (seqStr === 'P,N' || seqStr === 'P,N,P' || seqStr === 'N,P,N') {
                            return { fullPath: path, type: seqStr };
                        }
                        continue; // 이 경로는 무효 → 다른 경로 계속 탐색
                    }

                    objects.forEach(next => {
                        if (interceptedIds.has(next.id)) return; // 반도체 밑 도선 무시
                        if (!isAdjacent(curr, next)) return;

                        // 타겟(-)은 여러 경로에서 도달 가능하도록 visited 체크 안 함
                        if (next === minus) {
                            queue.push([...path, next]);
                            return;
                        }

                        // 다른 전극(이 회로의 +/- 아닌)은 경로에서 제외
                        if (next.userData.type === 'PLUS' || next.userData.type === 'MINUS') return;

                        if (!visited.has(next.id)) {
                            visited.add(next.id);
                            queue.push([...path, next]);
                        }
                    });
                }
                return null;
            }
        }

        let hudTimeout = null;
        function updateLogicState(physicsResult) {
            const isFlowing = !!physicsResult;
            if (isFlowing !== wasFlowing) {
                wasFlowing = isFlowing;
                const hud = document.getElementById('success-hud');
                if (isFlowing) {
                    if (hud) {
                        const title = hud.querySelector('.hud-title');
                        if (physicsResult.type === 'P,N') title.innerText = 'PN 접합 성공';
                        else if (physicsResult.type === 'P,N,P') title.innerText = 'PNP 접합 성공';
                        else if (physicsResult.type === 'N,P,N') title.innerText = 'NPN 접합 성공';

                        hud.classList.add('active');
                        // 3초 후 HUD 자동 숨김
                        if (hudTimeout) clearTimeout(hudTimeout);
                        hudTimeout = setTimeout(() => {
                            hud.classList.remove('active');
                        }, 3000);
                    }
                    // + 극에서 출발해 P, N을 거쳐 - 극으로 가는 전체 경로(full path) 생성
                    createSparks(physicsResult.fullPath, 0xffdd00); // 원자(노란 불빛)가 연속적으로 이동하도록
                } else {
                    if (hud) {
                        hud.classList.remove('active');
                        if (hudTimeout) clearTimeout(hudTimeout);
                    }
                    clearSparks();
                }
            }
            return isFlowing;
        }

        function createSparks(pathNodes, colorHex) {
            if (!pathNodes || pathNodes.length < 2) return;
            const points = pathNodes.map(node => {
                const p = node.position.clone();
                p.y += 0.4; // 위로 약간 띄움
                return p;
            });
            const curve = new THREE.CatmullRomCurve3(points);

            // 원자가 줄지어 가도록 여러 개 생성
            for (let i = 0; i < 3; i++) {
                const sparkGeo = new THREE.SphereGeometry(0.18, 16, 16);
                const sparkMat = new THREE.MeshBasicMaterial({ color: colorHex });
                const spark = new THREE.Mesh(sparkGeo, sparkMat);

                const sparkLight = new THREE.PointLight(colorHex, 2, 3);
                spark.add(sparkLight);

                scene.add(spark);
                sparks.push({ mesh: spark, curve: curve, progress: i * 0.33, speed: 0.008 });
            }
        }

        function clearSparks() {
            sparks.forEach(s => scene.remove(s.mesh));
            sparks = [];
        }

        function updateSparks() {
            sparks.forEach(s => {
                s.progress += s.speed;
                if (s.progress > 1) s.progress = 0;
                const currentPos = s.curve.getPointAt(s.progress);
                s.mesh.position.copy(currentPos);
            });
        }

        function updateParticles(isFlowing) {
            const worldP = new THREE.Vector3();
            const plus = objects.find(o => o.userData.type === 'PLUS');
            const minus = objects.find(o => o.userData.type === 'MINUS');
            let flowDir = null;
            if (isFlowing && plus && minus) {
                flowDir = new THREE.Vector3().subVectors(minus.position, plus.position).normalize();
            }

            particles.forEach(p => {
                if (p.isDead) return;
                p.mesh.getWorldPosition(worldP);
                if (worldP.distanceTo(p.parent.position) > 2.5) { resetSingleParticle(p); return; }
                if (isFlowing && flowDir) {
                    p.mesh.position.addScaledVector(flowDir, 0.05);
                } else {
                    p.mesh.position.addScaledVector(new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5), 0.01);
                }
            });
        }

        function resetSingleParticle(p) { p.mesh.position.set((Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 1.5); }

        function spawnReal(type, pos, isAutoDraw = false) {
            const group = new THREE.Group();
            group.userData.type = type; group.position.copy(pos);
            if (type === 'WIRE') {
                const geo = new RoundedBoxGeometry(2, 0.4, 2, 4, 0.1);
                const mat = new THREE.MeshPhysicalMaterial({ color: 0xcd7f32, metalness: 1.0, roughness: 0.2, clearcoat: 1.0, clearcoatRoughness: 0.1 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true; mesh.receiveShadow = true;
                group.add(mesh);
            } else if (type === 'P' || type === 'N') {
                const geo = new RoundedBoxGeometry(2, 2, 2, 6, 0.2);
                const mat = new THREE.MeshPhysicalMaterial({
                    color: type === 'P' ? 0xff3333 : 0x3333ff,
                    metalness: 0.1, roughness: 0.05,
                    transmission: 0.95, thickness: 2.0,
                    ior: 1.5,
                    transparent: true, opacity: 1.0,
                    clearcoat: 1.0, clearcoatRoughness: 0.1,
                    iridescence: 0.8,
                    iridescenceIOR: 1.3,
                    iridescenceThicknessRange: [100, 400]
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true; mesh.receiveShadow = true;
                group.add(mesh);
                for (let i = 0; i < 10; i++) {
                    const m = new THREE.Mesh(
                        new THREE.SphereGeometry(0.12, 16, 16),
                        new THREE.MeshStandardMaterial({
                            color: 0xffffff,
                            emissive: type === 'P' ? 0xff2222 : 0x2222ff,
                            emissiveIntensity: 2.5,
                            roughness: 0.1,
                            toneMapped: false
                        })
                    );
                    m.position.set((Math.random() - 0.5) * 1.6, (Math.random() - 0.5) * 1.6, (Math.random() - 0.5) * 1.6);
                    group.add(m); particles.push({ mesh: m, type: type, isDead: false, parent: group });
                }
            } else {
                // 고급 전극(Electrode) 디자인 적용
                // 1. 하단 베이스 (Dark Metal)
                const baseGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.4, 32);
                const baseMat = new THREE.MeshPhysicalMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.5 });
                const baseMesh = new THREE.Mesh(baseGeo, baseMat);
                baseMesh.position.y = -0.8;
                baseMesh.castShadow = true; baseMesh.receiveShadow = true;
                group.add(baseMesh);

                // 2. 메인 바디 (Anodized Metal)
                const bodyGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.6, 32);
                const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.2, clearcoat: 1.0 });
                const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
                bodyMesh.position.y = 0.2;
                bodyMesh.castShadow = true; bodyMesh.receiveShadow = true;
                group.add(bodyMesh);

                // 3. 네온 글로우 링 (Glowing Ring)
                const ringGeo = new THREE.TorusGeometry(0.61, 0.05, 16, 32);
                const ringMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: type === 'PLUS' ? 0xff2222 : 0x2222ff,
                    emissiveIntensity: 6.0,
                    toneMapped: false
                });
                const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                ringMesh.position.y = 0.5;
                ringMesh.rotation.x = Math.PI / 2;
                group.add(ringMesh);

                // 4. 상단 크롬 캡 (Chrome Cap)
                const capGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 32);
                const capMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 1.0, roughness: 0.1 });
                const capMesh = new THREE.Mesh(capGeo, capMat);
                capMesh.position.y = 1.1;
                capMesh.castShadow = true;
                group.add(capMesh);

                // 5. 발광 +/- 기호 (Glowing Sign)
                const signMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: type === 'PLUS' ? 0xff2222 : 0x2222ff,
                    emissiveIntensity: 4.0,
                    toneMapped: false
                });
                const signH = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.12), signMat);
                signH.position.y = 1.21;
                group.add(signH);
                if (type === 'PLUS') {
                    const signV = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.05, 0.5), signMat);
                    signV.position.y = 1.21;
                    group.add(signV);
                }
            }
            group.scale.set(0.01, 0.01, 0.01);
            scene.add(group); objects.push(group);

            let scaleFrames = 0;
            const popAnim = () => {
                scaleFrames++;
                group.scale.lerp(new THREE.Vector3(1, 1, 1), 0.2);
                if (scaleFrames < 30) requestAnimationFrame(popAnim);
                else group.scale.set(1, 1, 1);
            };
            popAnim();

            if (type === 'WIRE') {
                if (!isAutoDraw) updateWireArrows(pos);
                else hideArrows();
            } else {
                hideArrows();
            }
            if (!isAutoDraw) clearSelection();
        }

        function updateWireArrows(basePos) {
            hideArrows();
            [new THREE.Vector3(2, 0, 0), new THREE.Vector3(-2, 0, 0), new THREE.Vector3(0, 0, 2), new THREE.Vector3(0, 0, -2)].forEach(d => {
                const tp = new THREE.Vector3().copy(basePos).add(d);
                if (!objects.some(o => o.position.distanceTo(tp) < 0.1)) {
                    const a = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.6, 16), new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa00, transparent: true, opacity: 0.8 }));
                    a.position.copy(tp); a.lookAt(basePos); a.rotateX(Math.PI / 2);
                    scene.add(a); wireArrows.push(a);
                }
            });
        }

        function hideArrows() { wireArrows.forEach(a => scene.remove(a)); wireArrows = []; }

        function onMouseUp(event) {
            const dragDist = mouseDownPos.distanceTo(new THREE.Vector2(event.clientX, event.clientY));
            if (event.button === 0) {
                if (dragDist > 5) return; // Prevent spawning if dragging to rotate camera

                if (isDrawingWire) {
                    isDrawingWire = false;
                    updateWireArrows(lastWirePos);
                    return; // 선 그리기 종료
                }

                const ray = new THREE.Raycaster(); ray.setFromCamera(getMousePos(event), camera);

                // 와이어 화살표 클릭 확인 (선 그리기 시작)
                const aHit = ray.intersectObjects(wireArrows);
                if (aHit.length > 0) {
                    isDrawingWire = true;
                    lastWirePos.copy(aHit[0].object.position);
                    spawnReal('WIRE', lastWirePos.clone(), true);
                    return;
                }

                // 기존 오브젝트 클릭 확인 (이동/집어들기 기능)
                const oHit = ray.intersectObjects(objects, true);
                if (oHit.length > 0) {
                    let t = oHit[0].object; while (t.parent && !t.userData.type) t = t.parent;
                    if (t && t.userData.type) {
                        const now = Date.now();
                        const isDBL = (now - lastClickTime < 300); lastClickTime = now;
                        // 와이어 더블클릭 예외처리
                        if (isDBL && t.userData.type === 'WIRE') { updateWireArrows(t.position); return; }

                        // 1. 오브젝트 집어들기 (Pick up)
                        const type = t.userData.type;
                        particles = particles.filter(p => p.parent !== t);
                        scene.remove(t);
                        objects = objects.filter(o => o !== t);

                        // 2. 선택 상태로 변경
                        document.querySelectorAll('.block-item').forEach(b => {
                            b.classList.remove('active');
                            if (b.getAttribute('onclick').includes(`'${type}'`)) b.classList.add('active');
                        });
                        selectedType = type;
                        createGhost(type);
                        ghostMesh.visible = true;
                        ghostMesh.position.copy(t.position);
                        hideArrows();
                        return; // 스폰하지 않고 집어든 상태로 유지
                    }
                }

                // 빈 공간 클릭 시 스폰
                if (selectedType && ghostMesh?.visible) spawnReal(selectedType, ghostMesh.position.clone());
                else hideArrows();
            } else if (event.button === 2) {
                if (dragDist < 5) {
                    const ray = new THREE.Raycaster(); ray.setFromCamera(getMousePos(event), camera);
                    const hits = ray.intersectObjects([...objects, plane], true);
                    if (hits.length > 0) {
                        let t = hits[0].object; while (t.parent && !t.userData.type && !t.userData.isFloor) t = t.parent;
                        showContextMenu(event.clientX, event.clientY, t);
                    }
                }
            }
        }

        function showContextMenu(x, y, target) {
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block'; menu.style.left = x + 'px'; menu.style.top = y + 'px';
            rightClickedObject = target;

            const closeBtnHtml = `<span class="menu-close" onclick="closeContextMenu()">✕</span>`;

            if (target.userData.isFloor) {
                menu.innerHTML = `<div class="menu-title"><span>맵 크기 설정</span>${closeBtnHtml}</div>
                    <div class="menu-input-row">X: <input type="number" id="menuX" value="${curMapX}"></div>
                    <div class="menu-input-row">Z: <input type="number" id="menuZ" value="${curMapZ}"></div>
                    <button class="menu-btn apply" onclick="applyMenuMapSize()">적용하기</button>`;
            } else {
                menu.innerHTML = `<div class="menu-title"><span>부품 설정</span>${closeBtnHtml}</div><button class="menu-btn delete" onclick="deleteObj()">삭제하기</button>`;
            }
        }

        window.closeContextMenu = () => {
            document.getElementById('context-menu').style.display = 'none';
        };

        window.applyMenuMapSize = () => {
            curMapX = parseInt(document.getElementById('menuX').value) || 10;
            curMapZ = parseInt(document.getElementById('menuZ').value) || 10;
            updateFloor();
            document.getElementById('context-menu').style.display = 'none';
        };

        window.deleteObj = () => {
            if (rightClickedObject) {
                particles = particles.filter(p => p.parent !== rightClickedObject);
                scene.remove(rightClickedObject);
                objects = objects.filter(o => o !== rightClickedObject);
            }
            document.getElementById('context-menu').style.display = 'none';
        };

        function onMouseMove(event) {
            const intersect = getGridIntersect(event);

            // 와이어 연속 그리기 로직
            if (isDrawingWire && intersect) {
                let currentPos = lastWirePos.clone();
                let failsafe = 0;
                while (currentPos.distanceTo(intersect) > 0.1 && failsafe++ < 100) {
                    const dx = intersect.x - currentPos.x;
                    const dz = intersect.z - currentPos.z;
                    if (Math.abs(dx) > Math.abs(dz)) {
                        currentPos.x += Math.sign(dx) * GRID_SIZE;
                    } else {
                        currentPos.z += Math.sign(dz) * GRID_SIZE;
                    }

                    if (!objects.some(o => o.userData.type === 'WIRE' && o.position.distanceTo(currentPos) < 0.1)) {
                        spawnReal('WIRE', currentPos.clone(), true);
                    }
                }
                lastWirePos.copy(currentPos);
            }

            if (intersect && selectedType && !isDrawingWire) {
                if (!ghostMesh) createGhost(selectedType);
                ghostMesh.visible = true; ghostMesh.position.copy(intersect);
                ghostMesh.position.y = (selectedType === 'WIRE') ? 0.1 : 1;
            } else if (ghostMesh) ghostMesh.visible = false;
        }

        function getGridIntersect(event) {
            const ray = new THREE.Raycaster(); ray.setFromCamera(getMousePos(event), camera);
            const hits = ray.intersectObject(plane);
            if (hits.length > 0) return new THREE.Vector3(Math.round(hits[0].point.x / GRID_SIZE) * GRID_SIZE, 0, Math.round(hits[0].point.z / GRID_SIZE) * GRID_SIZE);
            return null;
        }

        function getMousePos(e) { return new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1); }
        function createGhost(type) {
            if (ghostMesh) scene.remove(ghostMesh);
            const geo = type === 'WIRE' ? new RoundedBoxGeometry(GRID_SIZE, 0.4, GRID_SIZE, 4, 0.1) : new RoundedBoxGeometry(GRID_SIZE, GRID_SIZE, GRID_SIZE, 6, 0.2);
            ghostMesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x00f2fe, transparent: true, opacity: 0.4, wireframe: true }));
            scene.add(ghostMesh);
        }


        window.selectType = (type, el) => {
            selectedType = type; hideArrows();
            document.querySelectorAll('.block-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active'); createGhost(type);
        };
        function clearSelection() { selectedType = null; if (ghostMesh) scene.remove(ghostMesh); ghostMesh = null; document.querySelectorAll('.block-item').forEach(b => b.classList.remove('active')); }
        window.resetScene = () => { objects.forEach(o => scene.remove(o)); particles = []; objects = []; hideArrows(); clearSparks(); };
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (composer) composer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
